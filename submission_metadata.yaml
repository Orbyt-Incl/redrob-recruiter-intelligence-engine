# ----------------------------------------------------------------------------
# AI tools declaration (transparency only — not penalized)
# ----------------------------------------------------------------------------
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architecture design, code authoring, and review. No candidate
  data was sent to any hosted LLM during the ranking step. The optional precompute enrichment
  module (src/enrich_llm.py) can call Claude offline, but it is disabled by default and the
  submitted ranking does not depend on it.

# ----------------------------------------------------------------------------
# Approach summary
# ----------------------------------------------------------------------------
methodology_summary: |
  Two-phase recruiter-intelligence ranker. Precompute (offline): structured JD spec, deterministic
  features (tenure/job-hopping, product-vs-consulting, title/domain signals, behavioral
  composites), a capability graph that infers latent capabilities (retrieval, ranking,
  recommendation, embeddings, evaluation, production ML) from career evidence even when keywords
  are absent, CPU sentence-transformer embeddings + FAISS, and rule-based honeypot detection.
  Ranking (<5 min, CPU, no network): FAISS shortlist (100k->1500) unioned with strong capability
  matches, then a Recruiter Intelligence Score blending capability fit, career evidence,
  availability, recruiter demand, and experience fit, minus soft penalties (job-hopping,
  consulting-only, research-only, CV/speech-only, title mismatch, location/notice). Honeypots are
  the only hard filter. Reasoning is generated from profile facts with no LLM and no hallucination.

